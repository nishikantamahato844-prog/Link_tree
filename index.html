<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nishikanta Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* BACKGROUND */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #F5E6EA, #E6EEF5, #E3F2E7, #EDE6F5);
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 360px;
  text-align: center;
  padding: 20px;
}

/* PROFILE */
.profile {
  width: 90px;
  border-radius: 50%;
  opacity: 0;
  transform: translateY(-20px);
  animation: fadeUp 0.6s ease forwards;
}

h1 {
  color: #2D2D2D;
  margin-top: 10px;
  opacity: 0;
  animation: fadeUp 0.6s ease forwards 0.2s;
}

p {
  color: #6B6B6B;
  margin-bottom: 18px;
  opacity: 0;
  animation: fadeUp 0.6s ease forwards 0.3s;
}

/* BUTTON BASE */
.btn {
  position: relative;
  display: block;
  padding: 14px;
  margin: 10px 0;
  border-radius: 28px;
  text-decoration: none;
  color: #3A3A3A;
  font-weight: 500;
  overflow: hidden;
  background-clip: border-box;
  backdrop-filter: blur(10px);
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  border 2px solid black;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.5s ease forwards;
}

/* ELECTRIC BORDER */
.btn::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 30px;

  background: linear-gradient(
    120deg,
    transparent,
    #00F0FF,
    #8a2eff,
    #00f0ff,
    transparent
  );
  opacity: 0;
}

/* ACTIVATE ELECTRIC EFFECT */
.btn:hover::before {
  opacity: 1;
  animation: electric 1.5s linear infinite;
}

/* KEEP TEXT ABOVE */
.btn span {
  position: relative;
  z-index: 1;
}

/* COLORS */
.pink { background: linear-gradient(90deg, #F6C1C7, #FAD0C4); }
.orange { background: linear-gradient(90deg, #F6D3A1, #EAC29A); }
.green { background: linear-gradient(90deg, #CDE7C9, #B7DDB5); }
.blue { background: linear-gradient(90deg, #C9E3F2, #B5D6EA); }
.purple { background: linear-gradient(90deg, #D8C9E8, #CBBBE3); }

/* HOVER */
.btn:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* CLICK */
.btn:active {
  transform: scale(0.97);
}

/* STAGGER ANIMATION */
.btn:nth-child(4) { animation-delay: 0.4s; }
.btn:nth-child(5) { animation-delay: 0.5s; }
.btn:nth-child(6) { animation-delay: 0.6s; }
.btn:nth-child(7) { animation-delay: 0.7s; }
.btn:nth-child(8) { animation-delay: 0.8s; }
.btn:nth-child(9) { animation-delay: 0.9s; }
.btn:nth-child(10){ animation-delay: 1s; }

/* SOCIAL */
.socials {
  margin-top: 15px;
  opacity: 0;
  animation: fadeUp 0.6s ease forwards 1.1s;
}

.socials a {
  display: inline-block;
}

.socials i {
  margin: 8px;
  font-size: 18px;
  color: #555;
  transition: 0.2s;
}

.socials a:hover i {
  transform: scale(1.2);
}

/* ANIMATIONS */
@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes electric {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
</head>

<body>

<div class="container">

  <!-- PROFILE -->
  <img src="/Nishikanta.jpg" width="150" height="100" class="profile">
  <h1>Nishikanta</h1>
  <p>Projects & Socials</p>

  <!-- PROJECT LINKS -->
  <a href="https://nishikantamahato844-prog.github.io/Calculater-/" target="_blank" class="btn pink"><span>Calculator</span></a>
  <a href="https://nishikantamahato844-prog.github.io/Cricket-quiz-/" target="_blank" class="btn orange"><span>Cricket quiz</span></a>
  <a href="https://nishikantamahato844-prog.github.io/Task-manager-/" target="_blank" class="btn green"><span>Task maneger</span></a>
  <a href="https://nishikantamahato844-prog.github.io/Happy-new-year/" target="_blank" class="btn blue"><span>New year</span></a>
  <a href="https://nishikantamahato844-prog.github.io/Word-multiplier-/" target="_blank" class="btn purple"><span>Word multiplier</span></a>
  <a href="https://nishikantamahato844-prog.github.io/Propose-website-/" target="_blank" class="btn pink"><span>Propose web</span></a>
  <a href="https://nishikantamahato844-prog.github.io/Nishikanta-/" target="_blank" class="btn blue"><span>Portfolio</span></a>

  <!-- SOCIAL LINKS -->
  <div class="socials">
    <a href="https://instagram.com/yourusername" target="_blank">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://github.com/yourusername" target="_blank">
      <i class="fab fa-github"></i>
    </a>

    <a href="https://linkedin.com/in/yourusername" target="_blank">
      <i class="fab fa-linkedin"></i>
    </a>
  </div>

</div>

<script>

/* OPTIONAL: CLICK TRACKING */
document.querySelectorAll('.btn').forEach((btn, i) => {
  btn.addEventListener('click', () => {
    console.log("Opened Project " + (i+1));
  });

</script>

</body>
</html>
